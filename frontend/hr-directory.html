<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEYLA OS - Employee Directory</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .directory-container { max-width: 1400px; margin: 0 auto; }
        .directory-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .directory-actions { display: flex; gap: 10px; margin-bottom: 20px; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .filter-group { display: flex; flex-direction: column; }
        .employee-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .employee-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .employee-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .employee-header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; }
        .employee-avatar { width: 60px; height: 60px; border-radius: 50%; border: 3px solid white; margin-right: 15px; }
        .employee-info h3 { margin-bottom: 5px; }
        .employee-meta { font-size: 14px; opacity: 0.9; }
        .employee-body { padding: 20px; }
        .employee-details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .detail-item { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .detail-icon { color: #667eea; width: 20px; }
        .employee-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .data-table-container.full-width { width: 100%; }
        .export-section { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        @media (max-width: 768px) { .employee-details-grid { grid-template-columns: 1fr; } .directory-actions { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-cube"></i>
                <span>HEYLA OS</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
                </a>
                <a href="crm.html" class="nav-item">
                    <i class="fas fa-chart-line"></i><span>CRM</span>
                </a>
                <a href="hr.html" class="nav-item has-submenu active">
                    <i class="fas fa-users"></i><span>HR <i class="fas fa-chevron-down" onclick="toggleHRSubmenu()"></i></span>
                </a>
                <div class="submenu active" id="hr-submenu">
                    <a href="hr-directory.html" class="nav-item submenu-item active">
                        <i class="fas fa-list"></i><span>Directory</span>
                    </a>
                    <a href="hr-add-employee.html" class="nav-item submenu-item">
                        <i class="fas fa-plus"></i><span>Add Employee</span>
                    </a>
                    <a href="hr-payroll.html" class="nav-item submenu-item">
                        <i class="fas fa-calculator"></i><span>Payroll</span>
                    </a>
                    <a href="hr-attendance.html" class="nav-item submenu-item">
                        <i class="fas fa-calendar-check"></i><span>Attendance</span>
                    </a>
                </div>
                <!-- Other links -->
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <img id="userAvatar" src="" alt="">
                    <div>
                        <p id="userName"></p>
                        <small id="userRole"></small>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i><span>Logout</span>
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <div class="breadcrumb">
                    <a href="hr.html">HR</a> > <span>Employee Directory</span>
                </div>
                <h1>Employee Directory</h1>
                <div class="header-actions">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="directorySearch" placeholder="Search employees...">
                    </div>
                    <button class="btn-primary" onclick="window.location.href='hr-add-employee.html'">
                        <i class="fas fa-plus"></i> Add Employee
                    </button>
                </div>
            </header>
            
            <div class="directory-container">
                <!-- Directory Stats -->
                <div class="directory-stats">
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <i class="fas fa-user-check"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="activeCount">0</h3>
                            <p>Active Employees</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">
                            <i class="fas fa-users-slash"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="inactiveCount">0</h3>
                            <p>Inactive/Left</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="avgSalary">KES 0</h3>
                            <p>Avg Monthly Salary</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon purple">
                            <i class="fas fa-percentage"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="turnoverRate">0%</h3>
                            <p>Turnover Rate</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon cyan">
                            <i class="fas fa-calendar"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="avgTenure">0</h3>
                            <p>Avg Tenure (yrs)</p>
                        </div>
                    </div>
                </div>
                
                <!-- Filters & Actions -->
                <div class="directory-actions">
                    <select id="statusFilter">
                        <option value="">All Status</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="probation">Probation</option>
                    </select>
                    <select id="departmentFilter">
                        <option value="">All Departments</option>
                        <option value="IT">IT</option>
                        <option value="HR">HR</option>
                        <option value="Finance">Finance</option>
                    </select>
                    <button class="btn-primary" onclick="applyFilters()">Filter</button>
                    <button class="btn-secondary" onclick="exportEmployees()">Export CSV</button>
                    <button class="btn-outline" onclick="clearFilters()">Clear</button>
                </div>
                
                <!-- Employee Cards View -->
                <div id="employeeCardsView" class="employee-card-grid">
                    <!-- Employee cards loaded here -->
                </div>
                
                <!-- Table View Toggle -->
                <div class="export-section">
                    <button class="btn-outline" onclick="toggleView('cards')">
                        <i class="fas fa-th-large"></i> Card View
                    </button>
                    <button class="btn-outline" onclick="toggleView('table')">
                        <i class="fas fa-list"></i> Table View
                    </button>
                </div>
                
                <!-- Table View -->
                <div id="employeeTableView" class="data-table-container" style="display: none;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Photo</th>
                                <th>Employee #</th>
                                <th>Name</th>
                                <th>Position</th>
                                <th>Department</th>
                                <th>Salary</th>
                                <th>Status</th>
                                <th>Join Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody">
                            <!-- Table rows loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
    <script>
        let employees = [];
        let currentView = 'cards';
        
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadEmployees();
            setupEventListeners();
        });
        
        function setupEventListeners() {
            document.getElementById('directorySearch').addEventListener('input', debounce(searchEmployees, 300));
            document.getElementById('statusFilter').addEventListener('change', applyFilters);
            document.getElementById('departmentFilter').addEventListener('change', applyFilters);
        }
        
        async function loadEmployees() {
            // Mock comprehensive employee data
            employees = [
                {
                    id: 1,
                    photo: 'https://ui-avatars.com/api/?name=John+Doe',
                    number: 'EMP001',
                    name: 'John Doe',
                    position: 'Senior Developer',
                    department: 'IT',
                    salary: 150000,
                    status: 'active',
                    joinDate: '2023-01-15',
                    probationEnd: null
                },
                {
                    id: 2,
                    photo: 'https://ui-avatars.com/api/?name=Jane+Smith',
                    number: 'EMP002',
                    name: 'Jane Smith',
                    position: 'HR Manager',
                    department: 'HR',
                    salary: 120000,
                    status: 'probation',
                    joinDate: '2024-01-01',
                    probationEnd: '2024-04-01'
                },
                // More mock data...
            ];
            
            renderEmployees();
            updateStats();
        }
        
        function renderEmployees() {
            if (currentView === 'cards') {
                document.getElementById('employeeCardsView').innerHTML = employees.map(emp => renderEmployeeCard(emp)).join('');
            } else {
                document.getElementById('employeeTableBody').innerHTML = employees.map(emp => renderEmployeeTableRow(emp)).join('');
            }
        }
        
        function renderEmployeeCard(emp) {
            const statusBadge = emp.status === 'active' ? 'badge-success' : 
                               emp.status === 'probation' ? 'badge-warning' : 'badge-danger';
            const statusText = emp.status.charAt(0).toUpperCase() + emp.status.slice(1);
            
            return `
                <div class="employee-card">
                    <div class="employee-header">
                        <img src="${emp.photo}" alt="${emp.name}" class="employee-avatar">
                        <div class="employee-info">
                            <h3>${emp.name}</h3>
                            <div class="employee-meta">${emp.position} • ${emp.department}</div>
                        </div>
                    </div>
                    <div class="employee-body">
                        <div class="employee-details-grid">
                            <div class="detail-item">
                                <i class="fas fa-id-badge detail-icon"></i>
                                <span>${emp.number}</span>
                            </div>
                            <div class="detail-item">
                                <i class="fas fa-calendar detail-icon"></i>
                                <span>Since ${emp.joinDate}</span>
                            </div>
                            ${emp.probationEnd ? `
                            <div class="detail-item">
                                <i class="fas fa-clock detail-icon"></i>
                                <span>Probation until ${emp.probationEnd}</span>
                            </div>` : ''}
                            <div class="detail-item">
                                <i class="fas fa-money-bill-wave detail-icon"></i>
                                <span>KES ${emp.salary.toLocaleString()}/month</span>
                            </div>
                        </div>
                        <div class="employee-actions">
                            <button class="btn-primary" onclick="viewEmployee(${emp.id})">
                                <i class="fas fa-eye"></i> View Profile
                            </button>
                            <button class="btn-outline" onclick="editEmployee(${emp.id})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn-outline danger" onclick="deleteEmployee(${emp.id})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderEmployeeTableRow(emp) {
            return `
                <tr>
                    <td><img src="${emp.photo}" alt="${emp.name}" style="width: 40px; height: 40px; border-radius: 50%;"></td>
                    <td>${emp.number}</td>
                    <td><strong>${emp.name}</strong></td>
                    <td>${emp.department}</td>
                    <td>KES ${emp.salary.toLocaleString()}</td>
                    <td><span class="badge ${emp.status === 'active' ? 'badge-success' : 'badge-warning'}">${emp.status.toUpperCase()}</span></td>
                    <td>${new Date(emp.joinDate).toLocaleDateString()}</td>
                    <td>
                        <button class="btn-icon" onclick="viewEmployee(${emp.id})" title="View">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn-icon" onclick="editEmployee(${emp.id})" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-icon danger" onclick="deleteEmployee(${emp.id})" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        }
        
        function updateStats() {
            const active = employees.filter(e => e.status === 'active').length;
            const inactive = employees.length - active;
            const avgSalary = employees.reduce((sum, e) => sum + e.salary, 0) / employees.length;
            
            document.getElementById('activeCount').textContent = active;
            document.getElementById('inactiveCount').textContent = inactive;
            document.getElementById('avgSalary').textContent = `KES ${Math.round(avgSalary).toLocaleString()}`;
        }
        
        function searchEmployees() {
            const query = document.getElementById('directorySearch').value.toLowerCase();
            const filtered = employees.filter(emp => 
                emp.name.toLowerCase().includes(query) ||
                emp.number.toLowerCase().includes(query) ||
                emp.position.toLowerCase().includes(query) ||
                emp.department.toLowerCase().includes(query)
            );
            renderEmployees(filtered);
        }
        
        function applyFilters() {
            let filtered = [...employees];
            
            const status = document.getElementById('statusFilter').value;
            if (status) filtered = filtered.filter(e => e.status === status);
            
            const department = document.getElementById('departmentFilter').value;
            if (department) filtered = filtered.filter(e => e.department === department);
            
            renderEmployees(filtered);
            showNotification(`${filtered.length} employees match your filters`, 'info');
        }
        
        function clearFilters() {
            document.getElementById('directorySearch').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('departmentFilter').value = '';
            renderEmployees();
        }
        
        function toggleView(view) {
            currentView = view;
            document.getElementById('employeeCardsView').style.display = view === 'cards' ? 'grid' : 'none';
            document.getElementById('employeeTableView').style.display = view === 'table' ? 'block' : 'none';
            renderEmployees();
        }
        
        function exportEmployees() {
            // Mock CSV export
            const csv = employees.map(emp => 
                `${emp.number},${emp.name},${emp.position},${emp.department},${emp.salary},${emp.status}`
            ).join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'employees.csv';
            a.click();
            showNotification('Employees exported to CSV', 'success');
        }
        
        // CRUD Actions
        function viewEmployee(id) {
            showNotification(`Opening employee profile ${id}`, 'info');
            // Navigate to detailed profile
        }
        
        function editEmployee(id) {
            showNotification(`Editing employee ${id}`, 'info');
            // Open edit modal or navigate to edit page
        }
        
        function deleteEmployee(id) {
            if (confirm('Are you sure you want to delete this employee?')) {
                // Remove from array
                employees = employees.filter(e => e.id !== id);
                renderEmployees();
                updateStats();
                showNotification('Employee deleted successfully', 'success');
            }
        }
        
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        
        function toggleHRSubmenu() {
            const submenu = document.getElementById('hr-submenu');
            submenu.style.display = submenu.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
