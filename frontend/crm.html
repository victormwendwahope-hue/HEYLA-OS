<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEYLA OS - CRM</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-cube"></i>
                <span>HEYLA OS</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="crm.html" class="nav-item active">
                    <i class="fas fa-chart-line"></i>
                    <span>CRM</span>
                </a>
                <a href="hr.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>HR</span>
                </a>
                <a href="accounting.html" class="nav-item">
                    <i class="fas fa-book"></i>
                    <span>Accounting</span>
                </a>
                <a href="networking.html" class="nav-item">
                    <i class="fas fa-network-wired"></i>
                    <span>Networking</span>
                </a>
                <a href="marketplace.html" class="nav-item">
                    <i class="fas fa-store"></i>
                    <span>Marketplace</span>
                </a>
                <a href="inventory.html" class="nav-item">
                    <i class="fas fa-boxes"></i>
                    <span>Inventory</span>
                </a>
                <a href="equipments.html" class="nav-item">
                    <i class="fas fa-tools"></i>
                    <span>Equipments</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <img id="userAvatar" src="" alt="">
                    <div>
                        <p id="userName"></p>
                        <small id="userRole"></small>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="top-bar">
                <h1>Customer Relationship Management</h1>
                <div class="header-actions">
                    <button class="btn-primary" onclick="showLeadModal()">
                        <i class="fas fa-plus"></i> New Lead
                    </button>
                </div>
            </header>
            
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('leads')">Leads</button>
                <button class="tab-btn" onclick="switchTab('deals')">Deals</button>
                <button class="tab-btn" onclick="switchTab('pipeline')">Pipeline</button>
            </div>
            
            <!-- Leads Table -->
            <div id="leadsTab" class="tab-content active">
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Company</th>
                                <th>Status</th>
                                <th>Value</th>
                                <th>Score</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="leadsTableBody">
                            <!-- Leads will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Deals Tab -->
            <div id="dealsTab" class="tab-content">
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Deal Name</th>
                                <th>Value</th>
                                <th>Probability</th>
                                <th>Stage</th>
                                <th>Expected Close</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="dealsTableBody">
                            <!-- Deals will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Pipeline Tab -->
            <div id="pipelineTab" class="tab-content">
                <div class="pipeline-container" id="pipelineContainer">
                    <!-- Pipeline stages will be rendered here -->
                </div>
            </div>
        </main>
    </div>
    
    <!-- Lead Modal -->
    <div id="leadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Lead</h3>
                <span class="close" onclick="closeLeadModal()">&times;</span>
            </div>
            <form id="leadForm">
                <input type="text" id="leadName" placeholder="Name" required>
                <input type="email" id="leadEmail" placeholder="Email" required>
                <input type="text" id="leadPhone" placeholder="Phone">
                <input type="text" id="leadCompany" placeholder="Company">
                <select id="leadIndustry">
                    <option value="Technology">Technology</option>
                    <option value="Finance">Finance</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Education">Education</option>
                    <option value="Retail">Retail</option>
                </select>
                <input type="number" id="leadValue" placeholder="Expected Value (KES)">
                <button type="submit" class="btn-primary">Save Lead</button>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
